<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(15, 22, 40, 0.7) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(26, 15, 46, 0.5) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .floating-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .floating-book {
            position: absolute;
            width: 40px;
            height: 55px;
            transform-style: preserve-3d;
            animation: floatBook 12s ease-in-out infinite;
        }

        .floating-book .book-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #d4af37 0%, #8b6914 100%);
            border-radius: 2px 6px 6px 2px;
            box-shadow: -2px 0 4px rgba(0,0,0,0.3);
            transform: rotateY(-10deg);
        }

        .floating-book .book-spine {
            position: absolute;
            left: -4px;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, #b8941e, #8b6914);
            border-radius: 2px 0 0 2px;
            transform: rotateY(70deg) translateZ(-2px);
        }

        .floating-book .book-pages {
            position: absolute;
            right: 2px;
            top: 3px;
            width: 85%;
            height: calc(100% - 6px);
            background: linear-gradient(90deg, #f5f0e0, #e8dcc8);
            border-radius: 0 3px 3px 0;
            transform: translateZ(-1px);
        }

        .fb1 { top: 10%; left: 5%; animation-delay: 0s; animation-duration: 14s; }
        .fb2 { top: 25%; right: 8%; animation-delay: -3s; animation-duration: 16s; }
        .fb3 { bottom: 20%; left: 12%; animation-delay: -6s; animation-duration: 13s; }
        .fb4 { top: 60%; right: 15%; animation-delay: -2s; animation-duration: 15s; }

        @keyframes floatBook {
            0%, 100% {
                transform: translateY(0) rotateX(10deg) rotateY(-15deg) rotateZ(-5deg);
                opacity: 0.2;
            }
            25% {
                transform: translateY(-30px) rotateX(15deg) rotateY(5deg) rotateZ(3deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-15px) rotateX(-5deg) rotateY(10deg) rotateZ(-2deg);
                opacity: 0.25;
            }
            75% {
                transform: translateY(-40px) rotateX(8deg) rotateY(-10deg) rotateZ(5deg);
                opacity: 0.2;
            }
        }

        .floating-bookmark {
            position: absolute;
            width: 12px;
            height: 45px;
            animation: floatBookmark 11s ease-in-out infinite;
        }

        .floating-bookmark::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #d4af37, #c9302c);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
        }

        .bm1 { top: 20%; right: 20%; animation-delay: -2s; }
        .bm2 { bottom: 35%; left: 30%; animation-delay: -6s; animation-duration: 13s; }

        @keyframes floatBookmark {
            0%, 100% {
                transform: translateY(0) rotateZ(5deg);
                opacity: 0.2;
            }
            50% {
                transform: translateY(-35px) rotateZ(-8deg);
                opacity: 0.35;
            }
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            animation: cardEntrance 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #f5e6a3, #d4af37);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 4s ease-in-out infinite;
            letter-spacing: 0.5px;
        }

        @keyframes goldShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-subtitle {
            font-size: 0.85rem;
            color: #888;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4),
                        0 0 60px rgba(212, 175, 55, 0.04);
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #b0b0b0;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.9rem 1.5rem;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-family: 'Raleway', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8941e);
            color: #0a0a0f;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #e0c050, #d4af37);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
            color: #0a0a0f;
        }

        .btn-secondary {
            background: transparent;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.35);
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.15);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(212, 175, 55, 0.15);
        }

        .divider span {
            font-size: 0.8rem;
            color: #666;
            font-weight: 400;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #555;
        }

        .footer-note a {
            color: rgba(212, 175, 55, 0.7);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-note a:hover {
            color: #d4af37;
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 1.3rem;
            }

            .card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-objects">
        <div class="floating-book fb1">
            <div class="book-spine"></div>
            <div class="book-pages"></div>
            <div class="book-cover"></div>
        </div>
        <div class="floating-book fb2">
            <div class="book-spine"></div>
            <div class="book-pages"></div>
            <div class="book-cover"></div>
        </div>
        <div class="floating-book fb3">
            <div class="book-spine"></div>
            <div class="book-pages"></div>
            <div class="book-cover"></div>
        </div>
        <div class="floating-book fb4">
            <div class="book-spine"></div>
            <div class="book-pages"></div>
            <div class="book-cover"></div>
        </div>
        <div class="floating-bookmark bm1"></div>
        <div class="floating-bookmark bm2"></div>
    </div>

    <div class="card-wrapper">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <div class="logo-text">Library Management System</div>
            <div class="logo-subtitle">Your gateway to knowledge</div>
        </div>

        <div class="card">
            <h2>Welcome! Please choose how to continue</h2>

            <div class="btn-group">
                <a href="{% url 'student_login' %}" class="btn btn-primary">Login</a>
                <div class="divider"><span>or</span></div>
                <a href="{% url 'student_signup' %}" class="btn btn-secondary">Create an Account</a>
            </div>
        </div>

        <div class="footer-note">
            <a href="{% url 'about' %}">Learn about the library</a> &nbsp;·&nbsp; Are you an administrator? <a href="{% url 'admin_login' %}">Admin login</a>
        </div>
    </div>
</body>
</html>
